<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DGGRID (webdggrid)</title>
    <link rel="icon" type="image/svg+xml"
        href="https://raw.githubusercontent.com/opengeoshub/vgridtools/refs/heads/main/images/vgrid.svg">
    <link rel="stylesheet" href="https://unpkg.com/maplibre-gl/dist/maplibre-gl.css" />
    <style>
        body {
            margin: 0;
            padding: 0;
        }

        #map {
            width: 100%;
            height: 100vh;
        }
    </style>
</head>

<body>

    <div id="map"></div>
    <script src="https://unpkg.com/maplibre-gl/dist/maplibre-gl.js"></script>
    <button type="button" onclick="exportToGeoJSON()" style="position: absolute; top: 10px; left: 10px;">
        Export
    </button>

    <script type="module">
        import DGGRIDGrid from "https://unpkg.com/vgrid-maplibre/DGGRID/DGGRID.js";
        // import DGGRIDGrid from './DGGRID.js';

        document.title = 'DGGRID (webdggrid / ISEA HEX)';

        const config = {
            lng: 106.706585,
            lat: 10.775326,
            zoom: 2,
            maxZoom: 24,
        };

        let currentPopup = null;

        const map = new maplibregl.Map({
            container: 'map',
            center: [config.lng, config.lat],
            zoom: config.zoom,
            maxZoom: config.maxZoom,
            style: 'https://raw.githubusercontent.com/opengeoshub/vstyles/main/versatiles/eclipse.json',
        });

        map.on('style.load', () => {
            map.addControl(new maplibregl.GlobeControl());
            try {
                new DGGRIDGrid(map, {
                    color: 'rgba(255, 0, 0, 1)',
                    width: 1.5,
                    redraw: 'moveend',
                    dggsConfig: {
                        poleCoordinates: { lat: 0, lng: 0 },
                        azimuth: 0,
                        topology: 'HEXAGON',  // HEXAGON, TRIANGLE, DIAMOND
                        projection: 'ISEA',
                        aperture: 4,
                        // apertureSequence: "434747"
                    },
                });
                console.log('DGGRID (webdggrid) added successfully.');
            } catch (error) {
                console.error('Failed to add DGGRID grid:', error);
            }
        });

        map.on('click', (e) => {
            const features = map.queryRenderedFeatures(e.point, {
                layers: ['dggrid-layer']
            });

            if (features.length) {
                const feature = features[0];
                const dggridId = feature.properties.dggrid_id ?? feature.properties.id ?? '';
                const res = feature.properties.resolution ?? '';

                const popupContent = `
                    <strong>DGGRID ID: </strong> ${dggridId} <br>
                    <strong>Resolution: </strong> ${res} <br>
                `;

                const popup = new maplibregl.Popup()
                    .setLngLat(e.lngLat)
                    .setHTML(popupContent)
                    .addTo(map);

                currentPopup = popup;

                if (!map.getSource('dggrid-highlight')) {
                    map.addSource('dggrid-highlight', {
                        type: 'geojson',
                        data: { type: 'FeatureCollection', features: [] },
                    });
                }
                if (!map.getLayer('dggrid-highlight-layer')) {
                    map.addLayer({
                        id: 'dggrid-highlight-layer',
                        type: 'fill',
                        source: 'dggrid-highlight',
                        paint: {
                            'fill-color': '#FF0000',
                            'fill-opacity': 0.2,
                        },
                    });
                }

                map.getSource('dggrid-highlight').setData({
                    'type': 'FeatureCollection',
                    'features': [feature]
                });
            }
        });

        map.on('contextmenu', () => {
            if (map.getSource('dggrid-highlight')) {
                map.getSource('dggrid-highlight').setData({
                    'type': 'FeatureCollection',
                    'features': []
                });
            }

            if (currentPopup) {
                currentPopup.remove();
                currentPopup = null;
            }
        });

        function exportToGeoJSON() {
            let features = map.queryRenderedFeatures({ layers: ['dggrid-layer'] });

            if (!features.length) {
                alert("No DGGRID features found in the current viewport.");
                return;
            }

            const geojson = {
                type: 'FeatureCollection',
                features: features
            };
            const blob = new Blob([JSON.stringify(geojson, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'DGGRID_webdggrid.geojson';
            a.click();
            URL.revokeObjectURL(url);
        }
        window.exportToGeoJSON = exportToGeoJSON;

    </script>
</body>

</html>
